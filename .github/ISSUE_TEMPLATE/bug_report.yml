name: Bug Report
description: Report a bug in Cinny-Min
labels: ['bug']

body:
  - type: markdown
    attributes:
      value: |
        ## Before submitting
        1. Search [existing issues](https://github.com/Endermoon21/cinny-min/issues?q=is%3Aissue) first
        2. Make sure Cinny-Min is up to date
        3. Include relevant logs if available

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of the app is affected?
      options:
        - Voice Channels / LiveKit
        - Game Streaming
        - Matrix Chat
        - UI / Interface
        - Installation / Updates
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug. Include screenshots if helpful.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?

  - type: textarea
    id: info
    attributes:
      label: Environment
      description: "System info and versions"
      placeholder: |
        - OS: Windows 11
        - Cinny-Min version: 4.12.x
        - Matrix homeserver: matrix.org
        - GPU (for streaming issues): NVIDIA RTX 3070
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Any relevant error messages or logs
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information
