name: Feature Request
description: Suggest a new feature or improvement
labels: ['enhancement']

body:
  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of the app would this affect?
      options:
        - Voice Channels
        - Game Streaming
        - Matrix Chat
        - UI / Interface
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem would this solve?
      placeholder: "I want to be able to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: "It would be great if..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative solutions you've thought of

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, or other relevant info
